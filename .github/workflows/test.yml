name: Test

on:
  push:
    branches: [main]
  pull_request:

env:
  CI: true
  PLAYWRIGHT_VERSION: '1.61.1'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dev
          build-args: |
            PLAYWRIGHT_VERSION=${{ env.PLAYWRIGHT_VERSION }}
          tags: doc-studio-dev
          load: true
          cache-from: type=gha,scope=doc-studio-dev
          cache-to: type=gha,mode=max,scope=doc-studio-dev

      - name: CI pipeline
        run: make ci-fast
