name: Release capture

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-capture-latest
  cancel-in-progress: true

env:
  IMAGE_NAME: doc-studio-capture
  BUNDLE_NAME: doc-studio-capture
  RELEASE_TAG: capture-latest
  IMAGE_TAG: latest
  ZIP_TAG: latest

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: meta_sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Image reference (lowercase for GHCR)
        id: image
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}/${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}:${{ env.IMAGE_TAG }}" >> "$GITHUB_OUTPUT"
          echo "Image: ${IMAGE}:${{ env.IMAGE_TAG }}"

      - name: Pack capture bundle
        run: |
          chmod +x scripts/pack-capture-bundle.sh
          ./scripts/pack-capture-bundle.sh "dist-capture/${{ env.BUNDLE_NAME }}"

      - name: Zip capture bundle
        working-directory: dist-capture
        run: |
          zip -r "${{ env.BUNDLE_NAME }}-${{ env.ZIP_TAG }}.zip" "${{ env.BUNDLE_NAME }}"
          ls -lh "${{ env.BUNDLE_NAME }}-${{ env.ZIP_TAG }}.zip"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (:latest only)
        uses: docker/build-push-action@v6
        with:
          context: dist-capture/${{ env.BUNDLE_NAME }}
          file: dist-capture/${{ env.BUNDLE_NAME }}/Dockerfile
          push: true
          tags: ${{ steps.image.outputs.ref }}
          cache-from: type=gha,scope=doc-studio-capture
          cache-to: type=gha,mode=max,scope=doc-studio-capture

      - name: Update GitHub Release (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Capture (latest)
          draft: false
          prerelease: true
          files: |
            dist-capture/${{ env.BUNDLE_NAME }}-${{ env.ZIP_TAG }}.zip
          body: |
            ## Doc Studio capture CLI (latest)

            Commit: `${{ steps.meta_sha.outputs.short_sha }}`

            ### Docker image (GHCR)

            ```bash
            docker pull ${{ steps.image.outputs.ref }}
            docker run --rm -v "$PWD:/work" \
              ${{ steps.image.outputs.ref }} \
              capture --file scenarios/my-flow.json
            ```

            ### Build from this release bundle

            ```bash
            unzip ${{ env.BUNDLE_NAME }}-latest.zip
            cd ${{ env.BUNDLE_NAME }}
            docker build -t ${{ env.IMAGE_NAME }} .
            ```

            The image was built from the attached zip (Dockerfile + capture scripts + entrypoint).
